<!DOCTYPE html>
<html>
<head>

<title>Movie Recommender</title>

<script src="https://cdn.tailwindcss.com"></script>

</head>

<body class="bg-gray-900 text-white">

<div class="text-center mt-10">

<h1 class="text-4xl font-bold">
🎬 Movie Recommendation System
</h1>

<form method="POST" class="mt-6">

<input
name="movie"
placeholder="Search movie..."
class="p-3 text-black rounded w-64">

<button
class="bg-blue-500 px-6 py-3 rounded">
Search
</button>

</form>

</div>

{% if movie %}

<h2 class="text-center mt-10 text-xl">
Because you watched <b>{{movie}}</b> you might like:
</h2>

<div class="grid grid-cols-5 gap-6 p-10">

{% for r in recs %}

<div class="bg-gray-800 rounded-lg p-3 hover:scale-105 transition">

<img src="{{r.poster}}" class="rounded">

<h3 class="mt-2 font-bold">{{r.title}}</h3>

<p class="text-green-400">
{{r.confidence}}% match
</p>

</div>

{% endfor %}

</div>

{% endif %}

</body>
</html>
